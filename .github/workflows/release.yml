name: Tag Action Release on Release

on:
  release:
    types: [created]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  releasetag:
    name: Tag Action Release
    uses: ./.github/workflows/action-release-tag.yml
    permissions:
      contents: write
    with:
      user: PaulsAutomationBot
