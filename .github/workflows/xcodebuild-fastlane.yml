name: Build and Test with xcodebuild or fastlane

on:
  workflow_call:
    inputs:
      job_name:
        description: |
          Custom name for the job displayed in the GitHub Actions UI.
          Useful to override the default name when called from other reusable workflows.
        required: false
        type: string
        default: 'Build and Test with xcodebuild or fastlane'
      path:
        description: |
          The path where the project is located. Defaults to $GITHUB_WORKSPACE.
        required: false
        type: string
        default: '.'
      runsonlabels:
        description: |
          JSON-based collection of labels indicating which type of GitHub runner should be chosen.
        required: false
        type: string
        default: '["macos-26"]'
      xcodeversion:
        description: |
          The Xcode version used for the build.
        required: false
        type: string
        default: 'latest-stable'
      scheme:
        description: |
          The scheme in the Xcode project.
          Use `scheme` to run xcodebuild, `fastlanelane` to run fastlane, or `customcommand` to run a custom command.
        required: false
        type: string
        default: ''
      buildConfig:
        description: |
          The build configuration parameter that should be passed to xcodebuild.
          Either use `Debug` or `Release` to build in the respective modes.
          If not defined, the `Debug` configuration is used.
        required: false
        type: string
        default: 'Debug'
      destination:
        description: |
          The destination parameter that should be passed to xcodebuild.
          Defaults to the iOS simulator using an iPhone 17 Pro.
        required: false
        type: string
        default: 'platform=iOS Simulator,name=iPhone 17 Pro'
      resultBundle:
        description: |
          The name of the Xcode result bundle that is passed to xcodebuild.
          If not defined, the name of the scheme + .xcresult is used.
        required: false
        type: string
        default: ''
      swiftVersion:
        description: |
          Specify the Swift language version when using xcodebuild.
        required: false
        type: string
        default: ''
      test:
        description: |
          A flag indicating if the tests of the Xcode project scheme should run when using xcodebuild.
        required: false
        type: boolean
        default: true
      testplan:
        description: |
          The test plan that should be run.
        required: false
        type: string
        default: ''
      spm-disable-prebuilts:
        description: |
          Disables package prebuilts when resolving SPM dependencies.
        type: boolean
        default: false
      fastlanelane:
        description: |
          The lane of the fastlane command.
          Use `scheme` to run xcodebuild, `fastlanelane` to run fastlane, or `customcommand` to run a custom command.
        required: false
        type: string
        default: ''
      customcommand:
        description: |
          A custom command that should be run after the setup.
          Use `scheme` to run xcodebuild, `fastlanelane` to run fastlane, or `customcommand` to run a custom command.
        required: false
        type: string
        default: ''
      artifactname:
        description: |
          The name & path of the artifact that should be uploaded at the end of the build.
        required: false
        type: string
        default: ''
      environment:
        description: |
          GitHub deployment environment to optionally adjust access to variables and secrets with additional protection rules.
          https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment
        required: false
        type: string
        default: ''
      setupsigning:
        description: |
          Set up the keychain to include the Apple certificate and provisioning profile.
        required: false
        type: boolean
        default: false
      setupfirebaseemulator:
        description: |
          Set up the Firebase Emulator and automatically use it for the automated fastlane commands.
        required: false
        type: boolean
        default: false
      firebaseemulatorimport:
        description: |
          Firebase import directory that contains Authentication, Cloud Firestore, Realtime Database and Cloud Storage data for Firebase emulators.
          Can be used to inject a shareable, common baseline data set.
        required: false
        type: string
        default: ''
      firebasejsonpath:
        description: |
          Path to the firebase.json file used to start the Firebase Emulator.
          Defaults to the root of the project.
        required: false
        type: string
        default: './firebase.json'
      googleserviceinfoplistpath:
        description: |
          Path to the GoogleService-Info.plist file that is replaced using the content found in the secret GOOGLE_SERVICE_INFO_PLIST.
        required: false
        type: string
        default: ''
      codeql:
        description: |
          Use CodeQL code scanning.
        required: false
        type: boolean
        default: false
      checkout_submodules:
        description: |
          Flag indicating if submodules should be automatically checked out.
        required: false
        type: boolean
      checkout_lfs:
        description: |
          Flag indicating if Git LFS should be used when running the checkout step.
        required: false
        type: boolean
        default: false
    secrets:
      BUILD_CERTIFICATE_BASE64:
        description: |
          The Base64-encoded Apple signing certificate used to build your iOS application.
        required: false
      P12_PASSWORD:
        description: |
          The password for the Apple signing certificate.
        required: false
      BUILD_PROVISION_PROFILE_BASE64:
        description: |
          The Base64-encoded Apple provisioning profile used to build your main application (e.g. iOS app).
        required: false
      BUILD_SECONDARY_PROVISION_PROFILE_BASE64:
        description: |
          The Base64-encoded Apple provisioning profile used to build an accompanying application (e.g. watchOS app).
        required: false
      KEYCHAIN_PASSWORD:
        description: |
          A password for the keychain that will be created on the runner instance.
        required: false
      APP_STORE_CONNECT_API_KEY_ID:
        description: |
          The key ID of the API key created in the App Store Connect API keys section.
        required: false
      APP_STORE_CONNECT_ISSUER_ID:
        description: |
          The issuer ID of the App Store Connect API is displayed in the App Store Connect API keys section.
        required: false
      APP_STORE_CONNECT_API_KEY_BASE64:
        description: |
          The content of the key created in App Store Connect condensed into a Base64 representation.
          Can be generated using, e.g., `$ base64 -i AuthKey_ABCDEFGHIJ.p8 | pbcopy`.
        required: false
      APPLE_ID:
        description: |
          The Apple ID you use to access the App Store Connect API.
        required: false
      CHECKOUT_TOKEN:
        description: |
          The personal access token (PAT) to use with the checkout action.
        required: false
      GOOGLE_SERVICE_INFO_PLIST_BASE64:
        description: |
          The Base64-encoded GoogleService-Info.plist file to use.
          Replace the file found at googleserviceinfoplistpath if the argument is set.
        required: false
      GOOGLE_APPLICATION_CREDENTIALS_BASE64:
        description: |
          The Base64-encoded private key JSON file used to start the Firebase Emulator.
          Only needed if Cloud Functions must run in the emulator.
        required: false

permissions:
  contents: read
  security-events: write

jobs:
  build_and_test:
    name: ${{ inputs.job_name }}
    runs-on: ${{ fromJson(inputs.runsonlabels) }}
    defaults:
      run:
        working-directory: ${{ inputs.path }}
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6
        with:
          # This is GitHub's way of implementing ternary expressions (see https://docs.github.com/en/actions/learn-github-actions/expressions)
          token: ${{ secrets.CHECKOUT_TOKEN != '' && secrets.CHECKOUT_TOKEN || github.token }}
          submodules: ${{ inputs.checkout_submodules }}
          lfs: ${{ inputs.checkout_lfs }}
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcodeversion }}
      - name: Check environment
        run: |
            xcodebuild -version
            swift --version
            echo "github-hosted: ${{ runner.environment == 'github-hosted' }}"
            echo "environment: ${{ inputs.environment }}"
            xcrun simctl list
      - name: Install xcbeautify
        if: ${{ runner.environment == 'github-hosted' && inputs.scheme != '' }}
        run: brew install xcbeautify
      - name: Cache Firebase emulators
        if: ${{ runner.environment == 'github-hosted' && inputs.setupfirebaseemulator }}
        uses: actions/cache@v5
        with:
          path: ~/.cache/firebase/emulators
          key: ${{ runner.os }}-${{ runner.arch }}-firebase-emulators-${{ hashFiles('~/.cache/firebase/emulators/**') }}
      - name: Set up Node.js
        if: ${{ runner.environment == 'github-hosted' && inputs.setupfirebaseemulator }}
        uses: actions/setup-node@v6
        with:
          package-manager-cache: false
      - name: Set up Java
        if: ${{ runner.environment == 'github-hosted' && inputs.setupfirebaseemulator }}
        uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '17'
      - name: Install Firebase CLI tools
        if: ${{ runner.environment == 'github-hosted' && inputs.setupfirebaseemulator }}
        run: npm install -g firebase-tools
      - name: Install the Apple certificate and provisioning profile
        if: ${{ inputs.setupsigning }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          BUILD_SECONDARY_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_SECONDARY_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create Variables
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          # Import Certificate and Provisioning Profile from Secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          # Create a Temporary Keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import Certificate to the Keychain
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Apply Provisioning Profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(grep UUID -A1 -a "$PP_PATH" | grep -io "[-A-F0-9]\{36\}")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"

          # Secondary Provisioning Profile
          if [ -n "$BUILD_SECONDARY_PROVISION_PROFILE_BASE64" ]; then
            PP_SECONDARY_PATH="$RUNNER_TEMP/build_pp_secondary.mobileprovision"
            echo -n "$BUILD_SECONDARY_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_SECONDARY_PATH"
            SECONDARY_UUID=$(grep UUID -A1 -a "$PP_SECONDARY_PATH" | grep -io "[-A-F0-9]\{36\}")
            cp "$PP_SECONDARY_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$SECONDARY_UUID.mobileprovision"
          fi
      - name: Set up Google services file
        if: ${{ inputs.googleserviceinfoplistpath != '' }}
        run: |
          echo -n "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode -o "${{ inputs.googleserviceinfoplistpath }}"
      - name: Initialize CodeQL
        if: ${{ runner.environment == 'github-hosted' && inputs.codeql }}
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          db-location: '${{ inputs.path }}/.codeql'
      - name: Mechanism to resolve CodeQL issue https://github.com/github/codeql-action/issues/2506#issuecomment-2594033147
        if: ${{ runner.environment == 'github-hosted' && inputs.codeql }}
        run: |
          XCODE_PATH=$(xcode-select -p)
          mkdir -p "$XCODE_PATH/Toolchains/XcodeDefault.xctoolchain/usr/lib"
          cp "$XCODE_PATH"/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/host/*.dylib "$XCODE_PATH/Toolchains/XcodeDefault.xctoolchain/usr/lib"
          sudo mkdir -p /usr/local/lib
          sudo cp "$XCODE_PATH"/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/host/*.dylib /usr/local/lib
      - name: Check available simulators
        if: ${{ inputs.scheme != '' }}
        env:
          SCHEME: ${{ inputs.scheme }}
        run: |
          xcrun xcodebuild -scheme "$SCHEME" -showdestinations
      - name: Run custom command
        if: ${{ inputs.customcommand != '' }}
        run: ${{ inputs.customcommand }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
      - name: Resolve dependencies (xcodebuild)
        if: ${{ inputs.scheme != '' }}
        env:
          SCHEME: ${{ inputs.scheme }}
          SPM_DISABLE_PREBUILTS: ${{ inputs.spm-disable-prebuilts }}
        run: |
            prebuilt_args=()
            if [ "$SPM_DISABLE_PREBUILTS" = "true" ]; then
                prebuilt_args=(-IDEPackageEnablePrebuilts=NO)
            fi

            xcodebuild \
              -scheme "$SCHEME" \
              -resolvePackageDependencies \
              -derivedDataPath ".derivedData" \
              "${prebuilt_args[@]}" \
            | xcbeautify \
            || true
      - name: Build and test (xcodebuild)
        if: ${{ inputs.scheme != '' }}
        env:
          BUILD_CONFIG: ${{ inputs.buildConfig }}
          DESTINATION: ${{ inputs.destination }}
          RESULT_BUNDLE_INPUT: ${{ inputs.resultBundle }}
          SCHEME: ${{ inputs.scheme }}
          SPM_DISABLE_PREBUILTS: ${{ inputs.spm-disable-prebuilts }}
          SWIFT_VERSION: ${{ inputs.swiftVersion }}
          TEST_ENABLED: ${{ inputs.test }}
          TESTPLAN: ${{ inputs.testplan }}
        run: |
            if [ "$TEST_ENABLED" = "true" ]; then
                xcode_command="test"
                code_coverage_args=(-enableCodeCoverage YES)
            else
                xcode_command="build"
                code_coverage_args=()
            fi

            if [ -z "$RESULT_BUNDLE_INPUT" ]; then
                result_bundle="$SCHEME.xcresult"
            else
                result_bundle="$RESULT_BUNDLE_INPUT"
            fi

            if [ "$BUILD_CONFIG" = "Release" ]; then
                enable_testing_flag="-enable-testing"
            else
                enable_testing_flag=""
            fi

            other_swift_flags="\$(inherited)"
            if [ -n "$enable_testing_flag" ]; then
                other_swift_flags="$other_swift_flags $enable_testing_flag"
            fi
            if [ -n "$SWIFT_VERSION" ]; then
                other_swift_flags="$other_swift_flags -swift-version $SWIFT_VERSION"
            fi

            if [ -n "$TESTPLAN" ]; then
                testplan_args=(-testPlan "$TESTPLAN")
            else
                testplan_args=()
            fi

            if [ "$SPM_DISABLE_PREBUILTS" = "true" ]; then
                prebuilt_args=(-IDEPackageEnablePrebuilts=NO)
            else
                prebuilt_args=()
            fi

            set -o pipefail \
            && xcodebuild "$xcode_command" \
              -scheme "$SCHEME" \
              -configuration "$BUILD_CONFIG" \
              -destination "$DESTINATION" \
              "${testplan_args[@]}" \
              "${code_coverage_args[@]}" \
              -derivedDataPath ".derivedData" \
              -resultBundlePath "$result_bundle" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              OTHER_SWIFT_FLAGS="$other_swift_flags" \
              -skipPackagePluginValidation \
              -skipMacroValidation \
              "${prebuilt_args[@]}" \
            | xcbeautify
      - name: Run fastlane
        if: ${{ inputs.fastlanelane != '' }}
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          FASTLANE_LANE: ${{ inputs.fastlanelane }}
          FIREBASE_EMULATOR_IMPORT: ${{ inputs.firebaseemulatorimport }}
          FIREBASE_JSON_PATH: ${{ inputs.firebasejsonpath }}
          GOOGLE_APPLICATION_CREDENTIALS_BASE64: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_BASE64 }}
          SETUP_FIREBASE_EMULATOR: ${{ inputs.setupfirebaseemulator }}
        run: |
            if [ "$SETUP_FIREBASE_EMULATOR" = "true" ]; then
                # We try to do an npm install in the functions directory.
                npm --prefix ./functions install || true

                echo -n "$GOOGLE_APPLICATION_CREDENTIALS_BASE64" | base64 -d > "$RUNNER_TEMP/google-application-credentials.json"
                export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/google-application-credentials.json"
                echo "Stored the Google application credentials at $GOOGLE_APPLICATION_CREDENTIALS"

                if [ -n "$FIREBASE_EMULATOR_IMPORT" ]; then
                    echo "Importing firebase emulator data from $FIREBASE_EMULATOR_IMPORT"
                    firebase emulators:exec -c "$FIREBASE_JSON_PATH" --import="$FIREBASE_EMULATOR_IMPORT" "fastlane $FASTLANE_LANE"
                else
                    firebase emulators:exec -c "$FIREBASE_JSON_PATH" "fastlane $FASTLANE_LANE"
                fi
            else
                fastlane "$FASTLANE_LANE"
            fi
      - name: Run CodeQL analysis
        if: ${{ runner.environment == 'github-hosted' && inputs.codeql }}
        uses: github/codeql-action/analyze@v4
      - name: Upload artifact
        if: ${{ (success() || failure()) && inputs.artifactname != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifactname }}
          path: ${{ inputs.path }}/${{ inputs.artifactname }}
      - name: Clean up keychain and provisioning profile
        if: ${{ (inputs.setupsigning && runner.environment != 'github-hosted') || failure() }}
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles || true
      - name: Clean up Google application credentials
        if: ${{ inputs.fastlanelane != '' || failure() }}
        run: |
          rm -rf "$RUNNER_TEMP/google-application-credentials.json" || true
