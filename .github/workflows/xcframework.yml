name: Build XCFramework

on:
  workflow_call:
    inputs:
      workspaceFile:
        description: |
          The path of the Xcode workspace file, including the file extension.
        type: string
        required: true
      xcFrameworkName:
        description: |
          The name of the XCFramework to create.
          It must not include the default XCFramework extension ".xcframework" as the file naming is handled automatically by the workflow.
        type: string
        required: true
      scheme:
        description: |
          The project scheme that should be used for the archiving process.
        type: string
        required: true
      version:
        description: |
          The version number of the XCFramework embedded in the XCArchives.
        type: string
        required: false
        default: 'ci'
      configuration:
        description: |
          The build configuration to use when archiving the scheme, either Debug or Release.
        type: string
        required: false
        default: 'Release'
      runsonlabels:
        description: |
          JSON-based collection of labels indicating which type of GitHub runner should be chosen.
        type: string
        required: false
        default: '["macos-26"]'
      sdk:
        description: |
          JSON-based collection of SDKs for the exported framework.
          Defaults to all SDKs. You can list SDKs using `xcodebuild -showsdks`.
        type: string
        required: false
        default: '["iphoneos", "iphonesimulator", "macosx", "appletvos", "appletvsimulator", "xros", "xrsimulator", "watchos", "watchsimulator"]'
    secrets:
      access-token:
        description: |
          GitHub personal access token (PAT) to use for checking out the repository.
        required: false

permissions:
  actions: read
  contents: read

jobs:
  build-xcarchive:
    name: Build XCArchive
    uses: SchmiedmayerLab/.github/.github/workflows/xcarchive.yml@testPR
    with:
      workspaceFile: ${{ inputs.workspaceFile }}
      xcArchiveName: ${{ inputs.xcFrameworkName }}
      scheme: ${{ inputs.scheme }}
      version: ${{ inputs.version }}
      configuration: ${{ inputs.configuration }}
      runsonlabels: ${{ inputs.runsonlabels }}
      sdk: ${{ inputs.sdk }}
  create-xcframework:
    name: Build XCFramework
    runs-on: ${{ fromJson(inputs.runsonlabels) }}
    needs: build-xcarchive
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.access-token || github.token }}
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Check environment
        env:
          VERSION: ${{ inputs.version }}
        run: |
            xcodebuild -version
            swift --version
            echo "Release version: $VERSION"
      - uses: actions/download-artifact@v8
        with:
          path: ./.build
          merge-multiple: true
      - name: Unpack XCArchives and create XCFramework
        env:
          SDK_INPUT: ${{ inputs.sdk }}
          XCFRAMEWORK_NAME: ${{ inputs.xcFrameworkName }}
        run: |
            rm -rf "${XCFRAMEWORK_NAME}.xcframework"

            # Convert JSON array to space-separated string
            SDK_LIST="$SDK_INPUT"
            SDK_LIST="${SDK_LIST//[\[\]\",]/}" # Remove JSON characters
            echo "Parsed SDK list: $SDK_LIST"

            IFS=' ' read -r -a SDKS <<< "$SDK_LIST"
            framework_args=()
            for SDK in "${SDKS[@]}"; do
                # Unpack the XCArchive
                tar -zxvf "./.build/${XCFRAMEWORK_NAME}-${SDK}.xcarchive.tar.gz" -C ./.build/
                # Specify the path to the framework within the XCArchive
                ARCHIVE="./.build/${XCFRAMEWORK_NAME}-${SDK}.xcarchive/Products/Library/Frameworks/${XCFRAMEWORK_NAME}.framework"
                echo "Checking archive path: $ARCHIVE"
                if [ -d "$ARCHIVE" ]; then
                    framework_args+=("-framework" "$ARCHIVE")
                    echo "Archive path valid: $ARCHIVE"
                else
                    echo "Warning: Archive path for SDK $SDK does not exist: $ARCHIVE"
                fi
            done

            echo "Executing xcodebuild with args: ${framework_args[*]}"
            xcodebuild \
              -create-xcframework "${framework_args[@]}" \
              -output "${XCFRAMEWORK_NAME}.xcframework" \
              | xcbeautify \
              || { echo "xcodebuild failed"; exit 1; }

            rm -rf .build
      - name: Create artifacts
        env:
          XCFRAMEWORK_NAME: ${{ inputs.xcFrameworkName }}
        run: |
            tar -zcvf "${XCFRAMEWORK_NAME}.xcframework.tar.gz" "${XCFRAMEWORK_NAME}.xcframework"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.xcFrameworkName }}.xcframework.tar.gz
          path: ${{ inputs.xcFrameworkName }}.xcframework.tar.gz
