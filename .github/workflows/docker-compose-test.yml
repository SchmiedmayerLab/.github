name: Test Docker Compose Stack

on:
  workflow_call:
    inputs:
      dockerComposeFile:
        description: |
          Path or name of the Docker Compose file. The default value is `docker-compose.yml`.
        required: false
        type: string
        default: 'docker-compose.yml'
      workingDirectory:
        description: |
          The working directory for the GitHub Actions workflow. Defaults to $GITHUB_WORKSPACE.
        required: false
        type: string
        default: '.'
      testscript:
        description: |
          Optional path or name of a test script for the Docker Compose setup.
        required: false
        type: string
    secrets:
      ENV_FILE:
        description: |
          Contents of a .env file.
        required: false

permissions:
  contents: read

jobs:
  buildandtest:
    name: Test Docker Compose Stack
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.workingDirectory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > ${{ inputs.workingDirectory }}/.env
      - name: Start Docker Compose
        run: docker compose -f ${{ inputs.workingDirectory }}/${{ inputs.dockerComposeFile }} up -d --build
      - name: Run test script
        if: inputs.testscript != ''
        run: |
          sleep 5
          sh ${{ inputs.testscript }}
      - name: Stop Docker Compose
        if: always()
        run: docker compose down
