name: Run Periphery

on:
  workflow_call:
    inputs:
      path:
        description: |
          The path where the project is located. Defaults to $GITHUB_WORKSPACE.
        required: false
        type: string
        default: '.'
      runsonlabels:
        description: |
          JSON-based collection of labels indicating which type of GitHub runner should be chosen.
        required: false
        type: string
        default: '["macos-26"]'
      xcodeversion:
        description: |
          The Xcode version used for the build.
        required: false
        type: string
        default: 'latest-stable'
      strict:
        description: |
          Whether Periphery should run in --strict mode.
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  periphery:
    name: Run Periphery
    runs-on: ${{ fromJson(inputs.runsonlabels) }}
    defaults:
      run:
        working-directory: ${{ inputs.path }}
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcodeversion }}
      - name: Check environment
        run: |
            xcodebuild -version
            swift --version
            echo "github-hosted: ${{ runner.environment == 'github-hosted' }}"
      - name: Install periphery
        if: ${{ runner.environment == 'github-hosted' }}
        run: brew install periphery
      - name: Run periphery
        run: |
          periphery scan \
            --relative-results \
            --format github-actions \
            ${{ inputs.strict && '--strict' || '' }} \
            -- \
            -skipPackagePluginValidation \
            -skipMacroValidation
      - name: Clean up Periphery
        if: always()
        run: rm -rf ~/Library/Caches/com.github.peripheryapp
