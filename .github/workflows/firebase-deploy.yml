name: Deploy Firebase

on:
  workflow_call:
    inputs:
      nodeVersion:
        description: |
          Node.js version spec to use in SemVer notation.
        required: false
        type: string
        default: '24'
      path:
        description: |
          The path where the project is located. Defaults to $GITHUB_WORKSPACE.
        required: false
        type: string
        default: '.'
      customcommand:
        description: |
          Custom command to execute before deployment. Can be used to install dependencies for Cloud Functions.
        required: false
        type: string
        default: ''
      arguments:
        description: |
          Arguments passed to the `firebase deploy` command.
        required: false
        type: string
        default: ''
      environment:
        description: |
          GitHub deployment environment to optionally adjust access to variables and secrets with additional protection rules.
          https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment
        required: false
        type: string
        default: ''
      workingDirectory:
        description: |
          The working directory for the GitHub Actions workflow. Defaults to $GITHUB_WORKSPACE.
        required: false
        type: string
        default: '.'
    secrets:
      GOOGLE_APPLICATION_CREDENTIALS_BASE64:
        description: |
          The Base64-encoded private key JSON file for the service account.
          You can learn more about how to generate the JSON at https://cloud.google.com/iam/docs/service-accounts-create.
          The service account must have the minimum required permissions documented at https://firebase.google.com/docs/projects/iam/permissions.
        required: true
      ENV_FILE:
        description: |
          Contents of a .env file to inject before Firebase deployment.
        required: false

permissions:
  contents: read

jobs:
  deployfirebase:
    name: Deploy Firebase
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.path }}
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v7
      - name: Check environment
        run: |
            echo "github-hosted: ${{ runner.environment == 'github-hosted' }}"
            echo "environment: ${{ inputs.environment }}"
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.nodeVersion }}
          package-manager-cache: false
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '17'
      - name: Install Firebase CLI tools
        run: npm install -g firebase-tools
      - name: Create .env file
        env:
          ENV_FILE_CONTENTS: ${{ secrets.ENV_FILE }}
          WORKING_DIRECTORY: ${{ inputs.workingDirectory }}
        run: |
          if [ -z "$ENV_FILE_CONTENTS" ]; then
            exit 0
          fi

          mkdir -p "$WORKING_DIRECTORY"
          printf '%s' "$ENV_FILE_CONTENTS" > "$WORKING_DIRECTORY/.env"
      - name: Run custom command
        if: ${{ inputs.customcommand != '' }}
        run: ${{ inputs.customcommand }}
      - name: Deploy to Firebase
        run: |
          echo -n "${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_BASE64 }}" | base64 -d > "$RUNNER_TEMP/google-application-credentials.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/google-application-credentials.json"
          echo "Stored the Google application credentials at $GOOGLE_APPLICATION_CREDENTIALS"
          firebase deploy ${{ inputs.arguments }}
      - name: Clean up Google application credentials
        if: always()
        run: |
          rm -rf "$RUNNER_TEMP/google-application-credentials.json" || true
