name: Swift Package CI

on:
  workflow_call:
    inputs:
      linux_run_tests:
        description: |
          Whether to run the Linux Swift test matrix.
        type: boolean
        default: false
      linux_runners:
        description: |
          JSON-based collection of Linux runner labels.
        type: string
        default: '["blacksmith-4vcpu-ubuntu-2404"]'
    secrets:
      CODECOV_TOKEN:
        description: |
          The Codecov token used for private repositories.
        required: false

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  setup:
    name: Set Up Swift Package
    uses: SchmiedmayerLab/.github/.github/workflows/swift-package-setup.yml@v0.1

  build_and_test:
    name: Test Swift Package
    needs: setup
    uses: SchmiedmayerLab/.github/.github/workflows/swift-package-test.yml@v0.1
    with:
      package_name: ${{ needs.setup.outputs.package_name }}
      scheme: ${{ needs.setup.outputs.scheme }}
      platform_matrix: ${{ needs.setup.outputs.platform_matrix }}
      ui_platform_matrix: ${{ needs.setup.outputs.ui_platform_matrix }}
      linux_run_tests: ${{ inputs.linux_run_tests }}
      linux_runners: ${{ inputs.linux_runners }}
    secrets: inherit

  static_analysis:
    name: Analyze Swift Package
    needs: setup
    uses: SchmiedmayerLab/.github/.github/workflows/swift-package-static-analysis.yml@v0.1
    with:
      library_products: ${{ needs.setup.outputs.library_products }}
      platform_name: ${{ needs.setup.outputs.platform_name }}
      platform_version: ${{ needs.setup.outputs.platform_version }}
