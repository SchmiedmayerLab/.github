name: Deploy Next.js Site

on:
  workflow_call:
    inputs:
      nodeVersion:
        description: |
          Node.js version spec to use in SemVer notation.
        required: false
        type: string
        default: '24'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    name: Build Next.js Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.nodeVersion }}
          cache: 'npm'
      - name: Install Node.js dependencies
        run: npm ci
      - name: Build and export with Next.js
        run: npm run build
        env:
          NEXT_JS_OUTPUT: 'export'
          NEXT_JS_BASE_PATH: '/${{ github.event.repository.name }}'
          NEXT_JS_IMAGES_UNOPTIMIZED: true
      - name: Build docs
        run: npm run docs:ci --if-present
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          include-hidden-files: true
          path: ./out
  deploy:
    name: Deploy Next.js Site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
